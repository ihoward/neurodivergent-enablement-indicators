id: NDI-sxflss-v1
concept_id: NDI-sxflss
status: candidate
criteria_version: 1

criteria:
  inferred:
    - >
      Employee reviews describe confusion about team ownership, overlapping mandates,
      or inability to get decisions made due to unclear authority at team boundaries.
    - >
      News coverage or annual reports describe ongoing reorganizations, territory disputes,
      or duplicate team structures without indicating resolution mechanisms.
  declared:
    - >
      Organizational design documentation or team charters — publicly accessible —
      describe how overlap is identified and resolved, including who holds authority
      at overlap points.
    - >
      Leadership or strategy content describes a governance model for managing cross-functional
      ambiguity — including named decision-makers or arbitration processes.
  validated:
    - >
      Accredited verifier confirms: (1) documented governance mechanism exists for
      cross-functional overlap resolution, (2) decision ownership at overlap points is
      documented for major functional boundaries, (3) a process exists for escalating
      unresolved overlap disputes.

evidence_sources:
  inferred:
    - glassdoor_reviews
    - blind_reviews
    - news_coverage
    - annual_reports
  declared:
    - employee_handbook
    - organizational_design_documentation
    - leadership_content
  validated:
    - internal_policy_documents
    - process_documentation

citations:
  supporting:
    - >
      Galbraith, J. R. (1977). Organization Design. Addison-Wesley. [Establishes lateral
      coordination mechanisms as a structural design requirement for managing cross-functional
      interdependence.]
    - >
      Rizzo, J. R., House, R. J., & Lirtzman, S. I. (1970). Role conflict and ambiguity.
      Administrative Science Quarterly, 15(2), 150–163.
    - >
      Jackson, S. E., & Schuler, R. S. (1985). A meta-analysis on role ambiguity and role
      conflict. OBHDP, 36(1), 16–78.
  dissenting:
    - >
      Burns, T., & Stalker, G. M. (1961). The Management of Innovation. Tavistock.
      [Argues that organic structures with overlapping responsibilities are better suited
      to innovation environments — rigid boundary governance may reduce adaptive capacity.]

community_sources:
  - reddit:r/adhd
  - reddit:r/autism
  - reddit:r/neurodiversity
  - glassdoor
  - blind

implementation_notes: |
  Reorganization frequency is an inferred proxy: organizations that reorganize frequently
  without published governance mechanisms for overlap are likely to have chronic boundary
  ambiguity. Annual report disclosures about "organizational simplification" initiatives
  may indicate the problem is known.
