id: NDI-hgbbzn-v1
concept_id: NDI-hgbbzn

criteria:
  inferred: |
    Look for job descriptions and review content that emphasize behavioral
    expectations (e.g., "collaborative communication style," "high energy,"
    "strong presence") over outcome-based requirements. Employee reviews
    referencing unfair treatment related to communication style or personality
    rather than work quality are relevant signals. Availability of
    publicly-stated performance frameworks is a positive signal.

  declared: |
    The organization publicly states that performance evaluation criteria are
    documented and outcome-based. Published performance management frameworks,
    rubrics, or public descriptions of review processes that specify observable
    output criteria rather than stylistic conformance satisfy this criterion.

  validated: |
    The organization submits its performance management documentation to an
    accredited verifier who confirms that: (1) evaluation criteria are written,
    (2) criteria reference observable work outputs, and (3) criteria do not
    include subjective style-based dimensions without objective anchors.

citations:
  supporting:
    - >
      Austin, R. D., & Pisano, G. P. (2017). Neurodiversity as a competitive
