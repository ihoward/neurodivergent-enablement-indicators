normalized_name: "evaluation based on output rather than style"

title: Performance evaluation is based on output rather than style

description: |
  The organization assesses employee performance based on the quality and outcomes
  of work rather than stylistic conformance — such as communication style,
  social presentation, eye contact, or adherence to unwritten behavioral norms.
  Evaluation criteria are explicit, documented, and applied consistently.

