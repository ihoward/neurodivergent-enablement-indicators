id: NDI-yatlql
normalized_name: "hiring patterns avoid bias toward sameness"

title: Hiring patterns and signals avoid implicit bias toward behavioral sameness

description: |
  The organization's hiring practices, job descriptions, and employer branding do not
  systematically favor candidates who match a narrow behavioral or stylistic profile.
  Observable signals of bias toward sameness — including homogeneous leadership representation,
  job description language emphasizing personality over capability, and social-style screening
  criteria — are actively monitored and addressed.

evidence_categories:
  - inferred

notes: |
  ND rationale: Implicit hiring bias toward behavioral conformance functions as a structural
  filter against neurodivergent candidates. Even without explicit ND discrimination, job
  descriptions that emphasize traits associated with neurotypical presentation create a
  pipeline that systematically excludes neurodivergent talent.
