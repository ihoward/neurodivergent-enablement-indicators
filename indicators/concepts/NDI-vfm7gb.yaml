id: NDI-vfm7gb
normalized_name: "reliance on indicators grounded in proper methods"

title: Organizational assessments rely on indicators grounded in methodologically sound evidence

description: |
  The organization bases internal people-related assessments, indicators, and benchmarks
  on measures with documented methodological validity — including defined measurement
  procedures, reliable operationalization, and awareness of limitations. Pseudoscientific
  or unvalidated assessment instruments are not used in consequential HR or evaluation
  contexts.

evidence_categories:
  - inferred
  - declared

notes: |
  ND rationale: Organizations that use poorly-grounded assessments — including unvalidated
  personality frameworks, cultural "fit" scores, or subjective competency ratings — create
  evaluation environments where the measurement instrument itself is a source of bias.
  Methodological soundness is a precondition for fair evaluation of neurodivergent employees.
