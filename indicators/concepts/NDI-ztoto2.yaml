title: Workplace noise is actively managed and minimized

description: |
  The organization takes deliberate steps to manage auditory and sensory input
  in work environments. This may include access to quiet spaces, acoustic
  treatment of common areas, policies around noise in shared spaces, or
  flexibility to work in lower-stimulation environments.

