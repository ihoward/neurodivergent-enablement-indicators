id: NDI-yz5v2j
normalized_name: "coaching advisors understand nd work styles accessible without disclosure"

title: Coaching and advisory support is accessible without neurodivergent disclosure

description: |
  The organization provides coaching, advisory, and professional development support that
  is accessible to all employees without requiring disclosure of a neurodivergent identity,
  diagnosis, or disability. Coaches and advisors have demonstrable awareness of diverse
  cognitive work styles. Support is positioned as universally valuable, not as a remediation
  or accommodation pathway.

evidence_categories:
  - inferred
  - declared
  - validated

notes: |
  ND rationale: Gating support on disclosure creates a barrier for employees who cannot
  or do not wish to disclose. Universal access removes the stigma and risk associated
  with seeking support, while ensuring coaching resources are available to those who
  need them regardless of whether they have a formal diagnosis or are comfortable with
  organizational disclosure.
