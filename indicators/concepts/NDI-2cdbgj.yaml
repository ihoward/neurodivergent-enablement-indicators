normalized_name: "administrative processes simplified expense reporting"

title: Administrative processes are simplified and accessible

description: |
  The organization designs administrative processes — such as expense reporting,
  time tracking, procurement, and scheduling — to minimize cognitive load and
  procedural complexity. Processes are documented, consistent, and do not require
  navigating undocumented social knowledge to complete successfully.

