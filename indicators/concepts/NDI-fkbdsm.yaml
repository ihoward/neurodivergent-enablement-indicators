normalized_name: "procedural fairness in investigations"

title: Investigations and disciplinary processes demonstrate procedural fairness

description: |
  The organization's processes for handling grievances, complaints, and disciplinary
  matters follow documented, consistent procedures. Affected parties are informed
  of the process, have a meaningful opportunity to respond, and receive written
  outcomes. Procedural steps are not abbreviated or applied inconsistently.

