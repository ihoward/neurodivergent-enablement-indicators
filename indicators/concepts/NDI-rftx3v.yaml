id: NDI-rftx3v
normalized_name: "fairness justice of inquiries or accusations"

title: Inquiries and accusations are handled with procedural fairness

description: |
  The organization's processes for handling grievances, conduct inquiries, and accusations
  demonstrate procedural fairness: affected parties are informed of the process, have a
  genuine opportunity to present their account, are assessed by an impartial decision-maker,
  and receive a documented, proportionate outcome. Process steps are consistent across
  employees and organizational levels.

evidence_categories:
  - inferred
  - declared
  - validated

notes: |
  ND rationale: Neurodivergent employees are at elevated risk of misinterpretation in
  workplace conduct contexts — where communication differences may be coded as hostility,
  non-compliance, or insubordination. Procedural fairness protections ensure that behavioral
  differences are not weaponized in opaque processes without opportunity for response or appeal.
