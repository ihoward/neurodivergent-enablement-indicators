id: NDI-eohpdo
normalized_name: "manager changes treated as major environment change"

title: Manager transitions are treated as significant environmental changes

description: |
  The organization recognizes that a change in direct manager is a substantial
  disruption to the working environment — equivalent in impact to a significant
  physical or structural change. Transition processes include documented handoffs,
  structured onboarding between the employee and new manager, and allowance for
  adjustment periods.

