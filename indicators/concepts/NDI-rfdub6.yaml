normalized_name: "coaching available without nd disclosure"

title: Coaching and support are available without requiring neurodivergent disclosure

description: |
  The organization provides access to coaching, mentoring, and work-style
  support that employees can access without disclosing a neurodivergent identity,
  diagnosis, or disability. Support is framed as universally available and
  does not require a medical or HR-mediated accommodation process as a prerequisite.

