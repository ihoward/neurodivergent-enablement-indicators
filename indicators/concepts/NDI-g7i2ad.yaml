id: NDI-g7i2ad
normalized_name: "culture messaging avoids narrow conformity culture fit conformity boasting"

title: Culture messaging avoids narrow conformity signalling and culture-fit boasting

description: |
  The organization's public culture communications — including careers pages, employer
  branding materials, leadership messaging, and hiring collateral — do not prominently
  emphasize narrow behavioral conformity, intense social cohesion, or "culture fit" as
  a filtering criterion. Communications do not signal that behavioral uniformity or social
  style alignment is a prerequisite for success or belonging within the organization.

evidence_categories:
  - inferred

notes: |
  ND rationale: Prominent culture-fit messaging signals to neurodivergent applicants and
  employees that behavioral conformity is valued over output. Phrases emphasizing "we're
  a family," "high energy," "collaborative to the core," or "culture add" used as a
  fig-leaf for style filtering are detectable public signals of potential ND exclusion.
