release_id: NDR-0.1.0C-NDP-seed
taxonomy_id: NDT-0.1.0C-NDP-seed
release_date: 2026-03-04
status: candidate

description: |
  Seed candidate release of the expanded NEI indicator set. Introduces 30 indicator
  concepts across 15 domains covering administrative accessibility, performance and
  evaluation fairness, role clarity, decision governance, predictability and change
  management, sensory environment, workspace stability, cultural norms, hiring diversity,
  methodological integrity, support infrastructure, procedural justice, and experiential
  signal indicators.

  This release is open for community review before advancement to Standard.

