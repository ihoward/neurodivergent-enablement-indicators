description: |
  Initial release of the Neurodivergent Enablement Indicators framework.
  Establishes the core taxonomy with six domains and seven standard indicators
  covering administrative accessibility, performance evaluation, organizational
  clarity, sensory environment, support infrastructure, and governance and justice.

